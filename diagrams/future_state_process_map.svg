<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5A6B87"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E8B57"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#FFFFFF"/>

  <text x="30" y="36" font-size="20" font-weight="bold" fill="#1F3864">Future-State Process Map — A&amp;E Patient Journey</text>
  <text x="30" y="58" font-size="13" fill="#666666">Thameswood NHS FT (illustrative) | Post Patient Flow Improvement Programme</text>

  <!-- Swimlane labels -->
  <text x="20" y="120" font-size="12" font-weight="bold" fill="#1F3864">Patient /</text>
  <text x="20" y="135" font-size="12" font-weight="bold" fill="#1F3864">Reception</text>
  <text x="20" y="245" font-size="12" font-weight="bold" fill="#1F3864">Rapid</text>
  <text x="20" y="260" font-size="12" font-weight="bold" fill="#1F3864">Assessment</text>
  <text x="20" y="385" font-size="12" font-weight="bold" fill="#1F3864">Bed</text>
  <text x="20" y="400" font-size="12" font-weight="bold" fill="#1F3864">Management</text>
  <text x="20" y="540" font-size="12" font-weight="bold" fill="#1F3864">Ward /</text>
  <text x="20" y="555" font-size="12" font-weight="bold" fill="#1F3864">Ambulatory</text>

  <line x1="0" y1="160" x2="1200" y2="160" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="310" x2="1200" y2="310" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="460" x2="1200" y2="460" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Lane 1: Reception -->
  <rect x="100" y="95" width="130" height="55" rx="8" fill="#D5E8F0" stroke="#1F3864" stroke-width="1.5"/>
  <text x="165" y="118" font-size="12" text-anchor="middle" fill="#1A1A1A">Patient</text>
  <text x="165" y="134" font-size="12" text-anchor="middle" fill="#1A1A1A">arrives</text>

  <rect x="280" y="95" width="150" height="55" rx="8" fill="#D5E8F0" stroke="#1F3864" stroke-width="1.5"/>
  <text x="355" y="118" font-size="12" text-anchor="middle" fill="#1A1A1A">Reception &amp;</text>
  <text x="355" y="134" font-size="12" text-anchor="middle" fill="#1A1A1A">registration</text>
  <line x1="230" y1="122" x2="280" y2="122" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Lane 2: Rapid Assessment (NEW) -->
  <rect x="280" y="220" width="170" height="60" rx="8" fill="#D9F0DC" stroke="#2E8B57" stroke-width="2"/>
  <text x="365" y="243" font-size="12" text-anchor="middle" fill="#1A1A1A" font-weight="bold">Rapid assessment</text>
  <text x="365" y="259" font-size="11" text-anchor="middle" fill="#2E8B57" font-weight="bold">[NEW] &lt; 15 min target</text>
  <line x1="355" y1="150" x2="355" y2="220" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>

  <polygon points="600,220 720,250 600,280 480,250" fill="#FFF3CD" stroke="#C0673A" stroke-width="1.5"/>
  <text x="600" y="246" font-size="11" text-anchor="middle" fill="#1A1A1A">Ambulatory-</text>
  <text x="600" y="260" font-size="11" text-anchor="middle" fill="#1A1A1A">sensitive?</text>
  <line x1="450" y1="250" x2="480" y2="250" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="780" y="220" width="180" height="60" rx="8" fill="#D9F0DC" stroke="#2E8B57" stroke-width="2"/>
  <text x="870" y="243" font-size="12" text-anchor="middle" fill="#1A1A1A" font-weight="bold">Ambulatory Care Unit</text>
  <text x="870" y="259" font-size="11" text-anchor="middle" fill="#2E8B57" font-weight="bold">[NEW] diverted pathway</text>
  <line x1="720" y1="244" x2="780" y2="244" stroke="#2E8B57" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="745" y="234" font-size="10" fill="#2E8B57">Yes</text>

  <rect x="600" y="320" width="170" height="55" rx="8" fill="#FCE9D8" stroke="#C0673A" stroke-width="1.5"/>
  <text x="685" y="343" font-size="12" text-anchor="middle" fill="#1A1A1A">Full clinical</text>
  <text x="685" y="359" font-size="12" text-anchor="middle" fill="#1A1A1A">assessment</text>
  <line x1="600" y1="265" x2="685" y2="265" stroke="#5A6B87" stroke-width="2"/>
  <line x1="685" y1="280" x2="685" y2="320" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="600" y="295" font-size="10" fill="#666666">No</text>

  <!-- Lane 3: Bed Management (NEW tool) -->
  <rect x="600" y="475" width="190" height="60" rx="8" fill="#D9F0DC" stroke="#2E8B57" stroke-width="2"/>
  <text x="695" y="498" font-size="12" text-anchor="middle" fill="#1A1A1A" font-weight="bold">Real-time bed-board</text>
  <text x="695" y="514" font-size="11" text-anchor="middle" fill="#2E8B57" font-weight="bold">[NEW] auto-flagged at 60 min</text>
  <line x1="685" y1="375" x2="685" y2="475" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="695" y="430" font-size="10" fill="#666666">Admit decision</text>

  <rect x="850" y="475" width="180" height="60" rx="8" fill="#D5E8F0" stroke="#1F3864" stroke-width="1.5"/>
  <text x="940" y="498" font-size="12" text-anchor="middle" fill="#1A1A1A">Daily flow huddle</text>
  <text x="940" y="514" font-size="11" text-anchor="middle" fill="#2E8B57" font-weight="bold">[NEW] escalation triggers</text>
  <line x1="790" y1="505" x2="850" y2="505" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Lane 4: Ward / end states -->
  <rect x="600" y="650" width="180" height="55" rx="8" fill="#DDEEDD" stroke="#3A7D44" stroke-width="1.5"/>
  <text x="690" y="673" font-size="12" text-anchor="middle" fill="#1A1A1A">Patient transferred</text>
  <text x="690" y="689" font-size="12" text-anchor="middle" fill="#1A1A1A">to ward</text>
  <line x1="695" y1="535" x2="695" y2="650" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow2)"/>

  <rect x="850" y="650" width="180" height="55" rx="8" fill="#DDEEDD" stroke="#3A7D44" stroke-width="1.5"/>
  <text x="940" y="673" font-size="12" text-anchor="middle" fill="#1A1A1A">Discharged from</text>
  <text x="940" y="689" font-size="12" text-anchor="middle" fill="#1A1A1A">Ambulatory Care</text>
  <line x1="870" y1="280" x2="940" y2="280" stroke="#5A6B87" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="940" y1="280" x2="940" y2="650" stroke="#5A6B87" stroke-width="2" stroke-dasharray="3,3" marker-end="url(#arrow2)"/>

  <!-- Legend -->
  <rect x="30" y="715" width="18" height="18" fill="#D9F0DC" stroke="#2E8B57" stroke-width="2"/>
  <text x="55" y="729" font-size="11" fill="#333333">New process step / control introduced by this programme</text>
  <rect x="430" y="715" width="18" height="18" fill="#FCE9D8" stroke="#C0673A"/>
  <text x="455" y="729" font-size="11" fill="#333333">Existing clinical step (unchanged)</text>
  <rect x="700" y="715" width="18" height="18" fill="#DDEEDD" stroke="#3A7D44"/>
  <text x="725" y="729" font-size="11" fill="#333333">Journey end state</text>

  <text x="30" y="752" font-size="11" fill="#888888">Source: BRD Section 6 (Proposed Solution) | Illustrative case study based on NHS England published A&amp;E performance trends</text>
</svg>
