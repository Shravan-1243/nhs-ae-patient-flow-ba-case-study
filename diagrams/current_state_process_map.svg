<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5A6B87"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C0392B"/>
    </marker>
  </defs>

  <rect width="1200" height="720" fill="#FFFFFF"/>

  <text x="30" y="36" font-size="20" font-weight="bold" fill="#1F3864">Current-State Process Map — A&amp;E Patient Journey</text>
  <text x="30" y="58" font-size="13" fill="#666666">Thameswood NHS FT (illustrative) | Arrival to Admission/Discharge/Transfer Decision</text>

  <!-- Swimlane labels -->
  <text x="20" y="120" font-size="12" font-weight="bold" fill="#1F3864">Patient /</text>
  <text x="20" y="135" font-size="12" font-weight="bold" fill="#1F3864">Reception</text>
  <text x="20" y="245" font-size="12" font-weight="bold" fill="#1F3864">Triage /</text>
  <text x="20" y="260" font-size="12" font-weight="bold" fill="#1F3864">Clinical</text>
  <text x="20" y="370" font-size="12" font-weight="bold" fill="#1F3864">Bed</text>
  <text x="20" y="385" font-size="12" font-weight="bold" fill="#1F3864">Management</text>
  <text x="20" y="510" font-size="12" font-weight="bold" fill="#1F3864">Ward /</text>
  <text x="20" y="525" font-size="12" font-weight="bold" fill="#1F3864">Inpatient</text>

  <!-- Lane separators -->
  <line x1="0" y1="160" x2="1200" y2="160" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Lane 1: Reception -->
  <rect x="120" y="95" width="140" height="55" rx="8" fill="#D5E8F0" stroke="#1F3864" stroke-width="1.5"/>
  <text x="190" y="118" font-size="12" text-anchor="middle" fill="#1A1A1A">Patient</text>
  <text x="190" y="134" font-size="12" text-anchor="middle" fill="#1A1A1A">arrives</text>

  <rect x="320" y="95" width="160" height="55" rx="8" fill="#D5E8F0" stroke="#1F3864" stroke-width="1.5"/>
  <text x="400" y="118" font-size="12" text-anchor="middle" fill="#1A1A1A">Reception &amp;</text>
  <text x="400" y="134" font-size="12" text-anchor="middle" fill="#1A1A1A">registration</text>

  <line x1="260" y1="122" x2="320" y2="122" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lane 2: Triage/Clinical -->
  <rect x="320" y="220" width="160" height="55" rx="8" fill="#FCE9D8" stroke="#C0673A" stroke-width="1.5"/>
  <text x="400" y="243" font-size="12" text-anchor="middle" fill="#1A1A1A">Triage</text>
  <text x="400" y="259" font-size="11" text-anchor="middle" fill="#C0392B" font-weight="bold">[!] Delay risk</text>
  <line x1="400" y1="150" x2="400" y2="220" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="540" y="220" width="180" height="55" rx="8" fill="#FCE9D8" stroke="#C0673A" stroke-width="1.5"/>
  <text x="630" y="243" font-size="12" text-anchor="middle" fill="#1A1A1A">Clinical</text>
  <text x="630" y="259" font-size="12" text-anchor="middle" fill="#1A1A1A">assessment</text>
  <line x1="480" y1="247" x2="540" y2="247" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="800,220 900,247 800,275 700,247" fill="#FFF3CD" stroke="#C0673A" stroke-width="1.5"/>
  <text x="800" y="243" font-size="11" text-anchor="middle" fill="#1A1A1A">Admit, transfer,</text>
  <text x="800" y="257" font-size="11" text-anchor="middle" fill="#1A1A1A">or discharge?</text>
  <line x1="720" y1="247" x2="700" y2="247" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="980" y="220" width="170" height="55" rx="8" fill="#DDEEDD" stroke="#3A7D44" stroke-width="1.5"/>
  <text x="1065" y="243" font-size="12" text-anchor="middle" fill="#1A1A1A">Discharge home</text>
  <text x="1065" y="259" font-size="11" text-anchor="middle" fill="#1A1A1A">(end of journey)</text>
  <line x1="900" y1="232" x2="980" y2="232" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="935" y="222" font-size="10" fill="#666666">Discharge</text>

  <!-- Lane 3: Bed management -->
  <rect x="800" y="350" width="170" height="55" rx="8" fill="#F0DDE8" stroke="#A03A6B" stroke-width="1.5"/>
  <text x="885" y="373" font-size="12" text-anchor="middle" fill="#1A1A1A">Bed request</text>
  <text x="885" y="389" font-size="11" text-anchor="middle" fill="#C0392B" font-weight="bold">[!] Primary delay point</text>
  <line x1="800" y1="262" x2="885" y2="262" stroke="#5A6B87" stroke-width="2" stroke-dasharray="0"/>
  <line x1="885" y1="275" x2="885" y2="350" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="895" y="320" font-size="10" fill="#666666">Admit decision</text>

  <rect x="600" y="350" width="160" height="55" rx="8" fill="#F0DDE8" stroke="#A03A6B" stroke-width="1.5"/>
  <text x="680" y="373" font-size="12" text-anchor="middle" fill="#1A1A1A">Bed allocation</text>
  <text x="680" y="389" font-size="11" text-anchor="middle" fill="#1A1A1A">search</text>
  <line x1="800" y1="377" x2="760" y2="377" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lane 4: Ward -->
  <rect x="600" y="480" width="180" height="55" rx="8" fill="#DDEEDD" stroke="#3A7D44" stroke-width="1.5"/>
  <text x="690" y="503" font-size="12" text-anchor="middle" fill="#1A1A1A">Patient transferred</text>
  <text x="690" y="519" font-size="12" text-anchor="middle" fill="#1A1A1A">to ward (end of journey)</text>
  <line x1="680" y1="405" x2="680" y2="480" stroke="#5A6B87" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Red breach loop annotation -->
  <path d="M 480 240 C 480 130 760 100 800 220" fill="none" stroke="#C0392B" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrowRed)"/>
  <text x="620" y="115" font-size="11" fill="#C0392B" font-weight="bold">4-hour clock running throughout</text>

  <!-- Legend -->
  <rect x="30" y="630" width="18" height="18" fill="#D5E8F0" stroke="#1F3864"/>
  <text x="55" y="644" font-size="11" fill="#333333">Reception / admin step</text>
  <rect x="230" y="630" width="18" height="18" fill="#FCE9D8" stroke="#C0673A"/>
  <text x="255" y="644" font-size="11" fill="#333333">Clinical step</text>
  <rect x="380" y="630" width="18" height="18" fill="#F0DDE8" stroke="#A03A6B"/>
  <text x="405" y="644" font-size="11" fill="#333333">Bed management step</text>
  <rect x="580" y="630" width="18" height="18" fill="#DDEEDD" stroke="#3A7D44"/>
  <text x="605" y="644" font-size="11" fill="#333333">Journey end state</text>
  <text x="780" y="644" font-size="11" fill="#C0392B" font-weight="bold">[!] = high-risk handoff (Section 5.2, BRD)</text>

  <text x="30" y="690" font-size="11" fill="#888888">Source: BRD Section 5.2 process analysis | Illustrative case study based on NHS England published A&amp;E performance trends</text>
</svg>
